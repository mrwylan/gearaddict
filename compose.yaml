services:
  postgres:
    image: postgres:18.3
    container_name: gearaddict-postgres
    environment:
      POSTGRES_DB: gearaddict
      POSTGRES_USER: gearaddict
      POSTGRES_PASSWORD: gearaddict
    ports:
      - "5432:5432"
    volumes:
      - gearaddict-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gearaddict -d gearaddict"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  gearaddict-pgdata:
